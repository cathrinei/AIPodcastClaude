name: Fiks norsk tekst i engelske episoder

on:
  workflow_dispatch:  # kjøres manuelt fra GitHub UI

permissions:
  contents: write
  models: read

jobs:
  fix-language:
    runs-on: ubuntu-latest

    steps:
      - name: Hent kode
        uses: actions/checkout@v5

      - name: Sett opp Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Installer avhengigheter
        run: pip install openai

      - name: Kjør fix_language.py
        run: python fix_language.py 2>&1 | tee /tmp/fix_language_output.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit og push hvis noe er endret
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add AI_KI_Podcasts.csv AI_KI_Podcasts.html AI_KI_Podcasts_arkiv.csv
          if git diff --cached --quiet; then
            echo "Ingen endringer å committe."
          else
            git commit -m "data: fiks norsk tekst i engelske episoder $(date +'%Y-%m-%d')"
            git pull --rebase
            git push
          fi

      - name: Skriv kjøreoppsummering
        if: always()
        run: |
          echo "## Språkfiks $(date +'%Y-%m-%d')" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/fix_language_output.txt >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "(ingen output)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
        shell: bash
