name: Hent nye podkast-episoder

on:
  schedule:
    - cron: '0 21 * * *'  # 23:00 norsk sommertid (CEST = UTC+2)
  workflow_dispatch:        # kan også kjøres manuelt fra GitHub

permissions:
  contents: write
  models: read

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Hent kode
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Sett opp Python
        uses: actions/setup-python@v5
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          python-version: '3.12'

      - name: Installer avhengigheter
        run: pip install openai

      - name: Kjør update_podcasts.py
        run: python update_podcasts.py 2>&1 | tee /tmp/fetch_output.txt

      - name: Kjør rate_episodes.py (filtrerer åpenbar ikke-AI)
        run: python rate_episodes.py 2>&1 | tee /tmp/rate_filter_output.txt

      - name: Kjør auto_rate.py (setter rating og metadata automatisk)
        run: python auto_rate.py 2>&1 | tee /tmp/auto_rate_output.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Kjør archive_episodes.py (arkiver episoder eldre enn 4 måneder)
        run: python archive_episodes.py 2>&1 | tee /tmp/archive_output.txt

      - name: Synkroniser HTML med CSV
        run: python sync_html.py

      - name: Commit og push hvis noe er endret
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add AI_KI_Podcasts.csv AI_KI_Podcasts.html pending_episodes.csv rejected_episodes.csv
          git add AI_KI_Podcasts_arkiv.csv 2>/dev/null || true
          git add failed_attempts.csv 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Ingen endringer å committe."
          else
            git commit -m "Auto-fetch og rate: episoder oppdatert $(date +'%Y-%m-%d')"
            git push
          fi

      - name: Skriv kjøreoppsummering
        if: always()
        run: |
          echo "## Podkast-oppdatering $(date +'%Y-%m-%d')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Henting av nye episoder" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/fetch_output.txt >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "(ingen output)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Filtrering (rate_episodes.py)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/rate_filter_output.txt >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "(ingen output)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Automatisk rating (auto_rate.py)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/auto_rate_output.txt >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "(ingen output)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Arkivering (archive_episodes.py)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/archive_output.txt >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "(ingen output)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
        shell: bash
